<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adobe Beautify</title>
    <link href="https://cdn.bootcss.com/normalize/8.0.1/normalize.min.css" rel="stylesheet">
    <link href="https://cdn.bootcss.com/fullPage.js/2.8.2/jquery.fullPage.min.css" rel="stylesheet">
    <link href="css/master.css" rel="stylesheet">
    <script src="https://cdn.bootcss.com/jquery/3.5.0/jquery.min.js"></script>
    <script src="https://cdn.bootcss.com/fullPage.js/2.8.2/jquery.fullPage.min.js"></script>
    <script src="https://cdn.bootcss.com/vue/2.6.11/vue.js"></script>
</head>
<script>
    $(function() {
        $('#fullpage').fullpage({
            navigation: true
        });
    });
</script>

<body>
    <div id="fullpage">
        <div id='app' class="section section1">
            <h1>Adobe Beautify</h1>
            <p>—— 从现在开始，改变你的世界 ——</p>
            <span>
                <button type="button" @click="Download">下载软件</button>
            </span>
        </div>
        <div class="section section2"></div>
        <div class="section section3"></div>
        <div class="section section4"></div>
    </div>
</body>
<script>
    new Vue({
        el: '#app',
        data: {
            link: 'http://abeautify.top/Installer.exe'
        },
        methods: {
            Download: function() {
                location.href = this.link;
            }
        }
    })
</script>

</html>
